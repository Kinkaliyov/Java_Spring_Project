<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="#{page.new_identity}">New Identity</title>
    <style>
        /* --- БАЗА И ЖИВОЙ ФОН --- */
        body {
            background: #050505;
            color: #e0e0e0;
            font-family: 'Inter', sans-serif;
            margin: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        /* Неоновые сферы как на остальных страницах */
        body::before, body::after {
            content: "";
            position: fixed;
            width: 500px;
            height: 500px;
            border-radius: 50%;
            background: rgba(0, 212, 255, 0.08);
            filter: blur(100px);
            z-index: -1;
            animation: float 20s infinite alternate ease-in-out;
        }
        body::after {
            background: rgba(255, 0, 212, 0.04);
            right: -10%;
            bottom: -10%;
            animation-duration: 25s;
        }

        @keyframes float {
            0% { transform: translate(-10%, -10%) scale(1); }
            100% { transform: translate(20%, 20%) scale(1.1); }
        }

        /* --- DYNAMIC GLASS PANEL --- */
        .register-container {
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(25px) saturate(180%);
            -webkit-backdrop-filter: blur(25px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 45px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.8);
            text-align: center;
            animation: panelReveal 0.7s cubic-bezier(0.22, 1, 0.36, 1);
        }

        @keyframes panelReveal {
            from { opacity: 0; transform: scale(0.9) translateY(30px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }

        h2 {
            color: #00d4ff;
            text-transform: uppercase;
            letter-spacing: 5px;
            text-shadow: 0 0 15px rgba(0, 212, 255, 0.5);
            margin-bottom: 35px;
            font-family: monospace;
        }

        /* --- INPUT GROUPS --- */
        .input-group {
            margin-bottom: 25px;
            text-align: left;
        }

        label {
            display: block;
            color: #00d4ff;
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 8px;
            font-weight: 800;
            opacity: 0.7;
        }

        input {
            width: 100%;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            color: #fff;
            padding: 14px;
            outline: none;
            font-size: 14px;
            transition: all 0.3s ease;
            box-sizing: border-box;
        }

        input:focus {
            border-color: #00d4ff;
            background: rgba(0, 212, 255, 0.05);
            box-shadow: 0 0 15px rgba(0, 212, 255, 0.2);
        }

        /* --- ОШИБКИ --- */
        .error-msg {
            color: #ff4444;
            font-size: 10px;
            margin-top: 6px;
            text-transform: uppercase;
            font-weight: bold;
        }

        .error-field {
            border-color: #ff4444 !important;
            box-shadow: 0 0 10px rgba(255, 68, 68, 0.2) !important;
        }

        /* --- КНОПКА --- */
        button {
            width: 100%;
            background: #00d4ff;
            border: none;
            color: #000;
            padding: 15px;
            border-radius: 8px;
            font-weight: 900;
            text-transform: uppercase;
            cursor: pointer;
            letter-spacing: 2px;
            transition: 0.4s;
            margin-top: 10px;
        }

        button:hover {
            background: #05f2ff;
            box-shadow: 0 0 30px rgba(0, 212, 255, 0.5);
            transform: translateY(-2px);
        }

        /* --- ССЫЛКА НАЗАД --- */
        .back-link {
            margin-top: 25px;
            display: block;
            color: #444;
            text-decoration: none;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: 0.3s;
        }

        .back-link:hover {
            color: #00d4ff;
        }
    </style>
</head>
<body>

<div class="register-container">
    <form th:action="@{/register}" th:object="${form}" method="post">
        <h2 th:text="#{page.new_identity}">New Identity</h2>

        <div class="input-group">
            <label th:text="#{label.user_name}">User Name</label>
            <input type="text" th:field="*{username}" th:placeholder="#{login.placeholder.user}"
                   th:classappend="${#fields.hasErrors('username')} ? 'error-field'">
            <div class="error-msg" th:if="${#fields.hasErrors('username')}" th:errors="*{username}"></div>
        </div>

        <div class="input-group">
            <label th:text="#{label.password}">Password</label>
            <input type="password" th:field="*{password}" th:placeholder="#{login.placeholder.pass}"
                   th:classappend="${#fields.hasErrors('password')} ? 'error-field'">
            <div class="error-msg" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></div>
        </div>

        <div class="input-group">
            <label th:text="#{label.password_confirm}">Password Confirm</label>
            <input type="password" th:field="*{confrimPassword}" th:placeholder="#{login.placeholder.pass}"
                   th:classappend="${#fields.hasErrors('confrimPassword')} ? 'error-field'">
            <div class="error-msg" th:if="${#fields.hasErrors('confrimPassword')}" th:errors="*{confrimPassword}"></div>
        </div>

        <button type="submit" th:text="#{btn.create_profile}">Create Profile</button>
        <a class="back-link" th:href="@{/login}" th:text="#{nav.back_auth}">← Back to Auth</a>
    </form>
</div>

</body>
</html>
