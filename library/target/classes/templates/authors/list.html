<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>AUTHOR_DATABASE_TERMINAL</title>
    <style>
        /* --- БАЗОВЫЕ НАСТРОЙКИ И ФИОЛЕТОВЫЙ ФОН --- */
        body {
            background: #050505;
            color: #e0e0e0;
            font-family: 'Inter', 'Segoe UI', sans-serif;
            margin: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
            overflow-x: hidden;
            position: relative;
        }

        /* Фиолетовые сферы на фоне */
        body::before, body::after {
            content: "";
            position: fixed;
            width: 500px;
            height: 500px;
            border-radius: 50%;
            background: rgba(188, 19, 254, 0.1);
            filter: blur(100px);
            z-index: -1;
            animation: float 20s infinite alternate ease-in-out;
        }
        body::after {
            background: rgba(123, 31, 162, 0.07);
            width: 400px;
            height: 400px;
            right: 5%;
            top: 10%;
            animation-duration: 25s;
            animation-delay: -7s;
        }

        @keyframes float {
            0% { transform: translate(-10%, -10%) scale(1); }
            100% { transform: translate(30%, 30%) scale(1.2); }
        }

        /* --- ЭФФЕКТ ПЕЧАТНОЙ МАШИНКИ (PURPLE) --- */
        .typewriter h2 {
            color: #bc13fe;
            font-family: monospace;
            overflow: hidden;
            border-right: .15em solid #bc13fe;
            white-space: nowrap;
            margin: 0 auto 30px auto;
            letter-spacing: .15em;
            animation:
                typing 3s steps(30, end),
                blink-caret .5s step-end infinite;
            width: fit-content;
        }

        @keyframes typing { from { width: 0 } to { width: 100% } }
        @keyframes blink-caret { from, to { border-color: transparent } 50% { border-color: #bc13fe } }

        /* --- GLASS PANEL --- */
        .glass-panel {
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(20px) saturate(180%);
            border: 1px solid rgba(188, 19, 254, 0.2);
            border-radius: 20px;
            padding: 40px;
            width: 100%;
            max-width: 900px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
            animation: panelFade 1s ease-out;
        }

        @keyframes panelFade {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* --- ТАБЛИЦА --- */
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        th {
            color: rgba(188, 19, 254, 0.7);
            text-align: left;
            padding: 15px;
            text-transform: uppercase;
            font-size: 11px;
            letter-spacing: 2px;
            border-bottom: 2px solid rgba(188, 19, 254, 0.3);
        }

        td {
            padding: 18px 15px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        tr:hover {
            background: rgba(188, 19, 254, 0.04);
            box-shadow: inset 3px 0 0 #bc13fe;
        }

        /* --- КНОПКИ --- */
        .add-btn {
            background: transparent;
            border: 1px solid #bc13fe;
            color: #bc13fe;
            padding: 10px 20px;
            border-radius: 6px;
            text-decoration: none;
            font-weight: bold;
            text-transform: uppercase;
            font-size: 12px;
            transition: 0.3s;
            display: inline-block;
            margin-bottom: 20px;
        }

        .add-btn:hover {
            background: #bc13fe;
            color: #000;
            box-shadow: 0 0 20px rgba(188, 19, 254, 0.4);
        }

        .btn-edit {
            color: #bc13fe;
            text-decoration: none;
            font-weight: bold;
            font-size: 12px;
        }

        .btn-delete {
            color: #ff4444;
            text-decoration: none;
            margin-left: 15px;
            font-weight: bold;
            font-size: 12px;
        }

        .btn-delete:hover { text-shadow: 0 0 10px #ff4444; }
        .btn-edit:hover { text-shadow: 0 0 10px #bc13fe; }

        /* --- ПАГИНАЦИЯ --- */
        .pagination {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid rgba(188, 19, 254, 0.1);
        }

        .pag-link {
            padding: 8px 16px;
            background: rgba(188, 19, 254, 0.05);
            color: #bc13fe;
            text-decoration: none;
            border-radius: 4px;
            border: 1px solid rgba(188, 19, 254, 0.2);
            transition: 0.3s;
            font-family: monospace;
            font-weight: bold;
        }

        .pag-link:hover {
            background: rgba(188, 19, 254, 0.2);
            box-shadow: 0 0 15px rgba(188, 19, 254, 0.4);
            transform: translateY(-2px);
        }

        .active-page {
            background: #bc13fe !important;
            color: #000 !important;
            box-shadow: 0 0 20px #bc13fe;
            border-color: #bc13fe;
        }

    </style>
</head>
<body>

<div class="glass-panel">
    <div class="typewriter">
        <h2>> ACCESSING_AUTHORS_DATA...</h2>
    </div>

    <a th:href="@{/authors/new}" class="add-btn">+ ADD_NEW_AUTHOR</a>

    <table>
        <thead>
        <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Actions</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="author : ${authors}">
            <td th:text="${author.id}" style="color: #bc13fe; font-family: monospace;"></td>
            <td th:text="${author.name}" style="color: #fff; font-weight: 500;"></td>
            <td>
                <a th:href="@{/authors/edit/{id}(id=${author.id})}" class="btn-edit">EDIT</a>
                <a th:href="@{/authors/delete/{id}(id=${author.id})}"
                   class="btn-delete"
                   onclick="return confirm('Вы уверены? Удаление автора удалит связанные данные!')">ERASE</a>
            </td>
        </tr>
        </tbody>

    </table>
    <div class="pagination" th:if="${totalPages > 1}">
        <a th:href="@{/authors(page=${currentPage - 1})}"
           th:if="${currentPage > 0}" class="pag-link">«</a>

        <span th:each="i : ${#numbers.sequence(0, totalPages - 1)}">
            <a th:href="@{/authors(page=${i})}"
               th:text="${i + 1}"
               class="pag-link"
               th:classappend="${i == currentPage} ? 'active-page'"></a>
        </span>

        <a th:href="@{/authors(page=${currentPage + 1})}"
           th:if="${currentPage < totalPages - 1}" class="pag-link">»</a>
    </div>
</div>

</body>
</html>
