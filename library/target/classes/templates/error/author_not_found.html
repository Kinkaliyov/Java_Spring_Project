<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>AUTHOR_VOID: GHOST_SIGNAL</title>
    <style>
        /* --- ГЛЮК-АНИМАЦИЯ (ФИОЛЕТОВАЯ) --- */
        @keyframes glitch {
            0% { text-shadow: 2px 0 #bc13fe, -2px 0 #00d4ff; }
            25% { text-shadow: -2px 0 #bc13fe, 2px 0 #00d4ff; }
            50% { text-shadow: 2px -2px #bc13fe, -2px 2px #00d4ff; }
            75% { text-shadow: -2px 2px #bc13fe, 2px -2px #00d4ff; }
            100% { text-shadow: 2px 0 #bc13fe, -2px 0 #00d4ff; }
        }

        /* Линия сканирования */
        .scanner {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 5px;
            background: rgba(188, 19, 254, 0.5);
            box-shadow: 0 0 20px #bc13fe;
            animation: scan 3s linear infinite;
            z-index: 5;
        }

        @keyframes scan {
            0% { top: 0%; }
            100% { top: 100%; }
        }

        body {
            background: #08020a; /* Темно-фиолетовый оттенок */
            color: #e0e0e0;
            font-family: 'Inter', 'Segoe UI', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            text-align: center;
        }

        body::before {
            content: " ";
            position: absolute;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.4) 50%),
                        linear-gradient(90deg, rgba(188, 19, 254, 0.05), rgba(0, 212, 255, 0.02), rgba(188, 19, 254, 0.05));
            background-size: 100% 3px, 5px 100%;
            pointer-events: none;
            z-index: 10;
        }

        h2 {
            color: #bc13fe;
            font-size: 5rem;
            margin: 0;
            text-transform: uppercase;
            letter-spacing: 12px;
            animation: glitch 0.3s infinite;
            position: relative;
        }

        p {
            font-size: 1.1rem;
            text-transform: uppercase;
            letter-spacing: 4px;
            color: #d192ff;
            margin-bottom: 40px;
            border-left: 3px solid #bc13fe;
            padding: 10px 20px;
            background: rgba(188, 19, 254, 0.05);
        }

        a {
            color: #bc13fe;
            text-decoration: none;
            border: 1px solid #bc13fe;
            padding: 15px 35px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 5px;
            transition: all 0.4s;
            position: relative;
            background: rgba(188, 19, 254, 0.1);
        }

        a:hover {
            background-color: #bc13fe;
            color: #000;
            box-shadow: 0 0 40px #bc13fe;
            transform: scale(1.05);
        }

        .corner-info {
            position: absolute;
            bottom: 25px;
            left: 25px;
            font-family: monospace;
            font-size: 11px;
            color: #5a2d7a;
            text-align: left;
            line-height: 1.5;
        }
    </style>
</head>
<body>

<div class="scanner"></div>

<h2>GHOST_AUTHOR</h2>
<p th:text="${message} ?: 'ERROR: CREATOR_SIGNAL_LOST_IN_VOID'"></p>

<a th:href="@{/books}">[ RECONNECT_TO_DATA_STREAM ]</a>

<div class="corner-info">
    SIGNAL_STATUS: LOST<br>
    ENTITY_TYPE: ARCHITECT<br>
    SEARCH_RESULT: 0x404_AUTHOR_NULL
</div>

</body>
</html>
