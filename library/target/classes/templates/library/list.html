<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Cyber Library Terminal</title>
    <style>
        /* --- БАЗОВЫЕ НАСТРОЙКИ И ФОН --- */
        body {
            background: #050505;
            color: #e0e0e0;
            font-family: 'Inter', 'Segoe UI', sans-serif;
            margin: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
            overflow-x: hidden;
            position: relative;
        }

        /* Живые сферы на фоне */
        body::before, body::after {
            content: "";
            position: fixed;
            width: 500px;
            height: 500px;
            border-radius: 50%;
            background: rgba(0, 212, 255, 0.1);
            filter: blur(100px);
            z-index: -1;
            animation: float 20s infinite alternate ease-in-out;
        }
        body::after {
            background: rgba(255, 0, 212, 0.05);
            width: 400px;
            height: 400px;
            right: 5%;
            top: 10%;
            animation-duration: 25s;
            animation-delay: -7s;
        }

        @keyframes float {
            0% { transform: translate(-10%, -10%) scale(1); }
            100% { transform: translate(30%, 30%) scale(1.2); }
        }

        /* --- ЭФФЕКТ ПЕЧАТНОЙ МАШИНКИ --- */
        .typewriter h2 {
            color: #00d4ff;
            font-family: monospace;
            overflow: hidden;
            border-right: .15em solid #00d4ff;
            white-space: nowrap;
            margin: 0 auto 30px auto;
            letter-spacing: .15em;
            animation:
                typing 3.5s steps(30, end),
                blink-caret .5s step-end infinite;
            width: fit-content;
        }

        @keyframes typing {
            from { width: 0 }
            to { width: 100% }
        }

        @keyframes blink-caret {
            from, to { border-color: transparent }
            50% { border-color: #00d4ff }
        }

        /* --- DYNAMIC GLASS PANEL --- */
        .glass-panel {
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 40px;
            width: 100%;
            max-width: 1100px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
            animation: panelFade 1s ease-out;
        }

        @keyframes panelFade {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* --- ТАБЛИЦА --- */
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        th {
            color: rgba(0, 212, 255, 0.6);
            text-align: left;
            padding: 15px;
            text-transform: uppercase;
            font-size: 11px;
            letter-spacing: 2px;
            border-bottom: 2px solid rgba(0, 212, 255, 0.2);
        }

        td {
            padding: 18px 15px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        tr:hover {
            background: rgba(0, 212, 255, 0.03);
            box-shadow: inset 3px 0 0 #00d4ff;
        }

        /* --- КНОПКИ --- */
        .add-btn {
            background: transparent;
            border: 1px solid #00d4ff;
            color: #00d4ff;
            padding: 10px 20px;
            border-radius: 6px;
            text-decoration: none;
            font-weight: bold;
            text-transform: uppercase;
            font-size: 12px;
            transition: 0.3s;
        }

        .add-btn:hover {
            background: #00d4ff;
            color: #000;
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.4);
        }

        button[type="submit"] {
            background: #00d4ff;
            border: none;
            color: #000;
            padding: 10px 20px;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
        }

        input[type="text"] {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 6px;
            color: #fff;
            padding: 10px 15px;
            outline: none;
        }

        /* ПАГИНАЦИЯ */
        .pagination {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-top: 30px;
        }

        .pagination a {
            padding: 8px 16px;
            background: rgba(255, 255, 255, 0.05);
            color: #888;
            text-decoration: none;
            border-radius: 4px;
            transition: 0.3s;
        }

        .active-page {
            background: rgba(0, 212, 255, 0.2) !important;
            color: #00d4ff !important;
            border: 1px solid #00d4ff;
        }

        .btn-delete { color: #ff4444 !important; margin-left: 10px; }

        .btn-logout {
            background: transparent;
            border: 1px solid #ff4444;
            color: #ff4444;
            padding: 10px 20px;
            border-radius: 6px;
            text-decoration: none;
            font-weight: bold;
            text-transform: uppercase;
            font-size: 12px;
            transition: 0.3s;
            margin-left: 10px;
        }

        .btn-logout:hover {
            background: #ff4444;
            color: #fff;
            box-shadow: 0 0 20px rgba(255, 68, 68, 0.4);
        }

        /* Добавим обертку для кнопок в ряд */
        .top-controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            gap: 15px;
        }
    </style>
</head>
<body>

<div style="display: flex; gap: 15px; margin-bottom: 20px; font-size: 12px; font-family: monospace;">
    <a th:href="@{/books(lang='en')}" style="color: #00d4ff; text-decoration: none;">[ EN ]</a>
    <a th:href="@{/books(lang='ru')}" style="color: #00d4ff; text-decoration: none;">[ RU ]</a>
    <a th:href="@{/books(lang='az')}" style="color: #00d4ff; text-decoration: none;">[ AZ ]</a>
</div>

<div class="glass-panel">
    <div class="typewriter">
        <h2 th:text="#{nav.accessing}">> ACCESSING_LIBRARY_DATABASE...</h2>
    </div>

    <div class="top-controls">
        <div>
            <a th:href="@{/books/new}" th:if="${isAdmin}" class="add-btn" th:text="#{btn.add_new}">+ ADD_NEW_RECORD</a>
        </div>

        <div style="display: flex; gap: 10px; align-items: center;">
            <form th:action="@{/books}" method="get" style="display: flex; gap: 10px;">
                <input type="text" name="keyword" th:placeholder="#{placeholder.search}" th:value="${keyword}">
                <button type="submit" th:text="#{btn.search}">SEARCH</button>
                <a th:href="@{/books}" th:if="${keyword != null}" style="color: #555; text-decoration: none; align-self: center; margin: 0 10px;" th:text="#{nav.reset}">[RESET]</a>
            </form>
            <a href="http://localhost:1504/login?logout" class="btn-logout" th:text="#{nav.logout}">LOGOUT_SESSION</a>
        </div>
    </div>

    <table>
        <thead>
        <tr>
            <th th:text="#{table.header.title}">Title</th>
            <th th:text="#{table.header.author}">Book_Author</th>
            <th th:text="#{table.header.price}">Price (AZN)</th>
            <th th:text="#{table.header.amount}">Amount</th>
            <th th:if="${isAdmin}" th:text="#{table.header.actions}">Actions</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="book : ${books}">
            <td th:text="${book.title}" style="color: #fff; font-weight: 500;"></td>
            <td th:text="${book.author != null ? book.author.name : #messages.msg('table.empty_auth')}"></td>
            <td th:text="${book.price}" style="color: #00d4ff;"></td>
            <td th:text="${book.amount}"></td>
            <td th:if="${isAdmin}">
                <a th:href="@{/books/edit/{id}(id=${book.id})}" style="color: #00d4ff; text-decoration: none;" th:text="#{btn.edit}">EDIT</a>
                <a class="btn-delete" th:href="@{/books/delete/{id}(id=${book.id})}"
                   th:onclick="return confirm([[#{confirm.erase}]])">X</a>
            </td>
        </tr>
        </tbody>
    </table>

    <div class="pagination" th:if="${totalPages > 1}">
        <a th:href="@{/books(page=${currentPage - 1}, keyword=${keyword})}"
           th:if="${currentPage > 0}">«</a>

        <span th:each="i : ${#numbers.sequence(0, totalPages - 1)}">
            <a th:href="@{/books(page=${i}, keyword=${keyword})}"
               th:text="${i + 1}"
               th:classappend="${i == currentPage} ? 'active-page'"></a>
        </span>

        <a th:href="@{/books(page=${currentPage + 1}, keyword=${keyword})}"
           th:if="${currentPage < totalPages - 1}">»</a>
    </div>
</div>

</body>
</html>
