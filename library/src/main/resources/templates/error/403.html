<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>ACCESS DENIED: RESTRICTED AREA</title>
    <style>
        /* --- ТРЕВОЖНОЕ МИГАНИЕ --- */
        @keyframes alarm {
            0% { background-color: #050505; }
            50% { background-color: #1a0505; }
            100% { background-color: #050505; }
        }

        @keyframes pulse-red {
            0% { text-shadow: 0 0 10px #ff0000; }
            50% { text-shadow: 0 0 30px #ff0000, 0 0 50px #ff4444; }
            100% { text-shadow: 0 0 10px #ff0000; }
        }

        /* --- БАЗА --- */
        body {
            background-color: #050505;
            color: #ffffff;
            font-family: 'Inter', 'Segoe UI', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            animation: alarm 2s infinite ease-in-out; /* Фоновая тревога */
        }

        /* ЗНАЧОК ОПАСНОСТИ */
        .warning-icon {
            font-size: 80px;
            color: #ff0000;
            margin-bottom: 10px;
            animation: pulse-red 1s infinite;
        }

        h2 {
            color: #ff0000;
            font-size: 4rem;
            margin: 0;
            text-transform: uppercase;
            letter-spacing: 10px;
            font-weight: 900;
            text-shadow: 0 0 20px #ff0000;
            text-align: center;
        }

        .status-box {
            border: 2px solid #ff0000;
            padding: 20px 40px;
            margin: 30px 0;
            background: rgba(255, 0, 0, 0.05);
            backdrop-filter: blur(5px);
        }

        p {
            font-size: 1.1rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #ff4444;
            margin: 0;
        }

        /* КНОПКА ОТСТУПЛЕНИЯ */
        a {
            color: #ffffff;
            text-decoration: none;
            border: 1px solid #ffffff;
            padding: 12px 25px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 3px;
            transition: all 0.3s;
            margin-top: 20px;
        }

        a:hover {
            background-color: #ffffff;
            color: #000000;
            box-shadow: 0 0 20px #ffffff;
            transform: translateY(-3px);
        }

        /* ТЕКСТ ВНИЗУ */
        .security-log {
            position: absolute;
            bottom: 30px;
            font-family: monospace;
            font-size: 12px;
            color: #444;
            text-align: center;
        }
    </style>
</head>
<body>

<div class="warning-icon">⚠</div>
<h2>403</h2>

<div class="status-box">
    <p>ДОСТУП ЗАБЛОКИРОВАН: НЕДОСТАТОЧНО ПРИВИЛЕГИЙ</p>
</div>

<a th:href="@{/books}">[ ПОКИНУТЬ ЗОНУ ]</a>

<div class="security-log">
    IP_ADDRESS: LOGGED<br>
    ATTEMPT_ID: 0xDEADBEEF<br>
    SECURITY_LEVEL: HIGH
</div>

</body>
</html>
