<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Error 404</title>
    <style>
        body {
            background-color: #000000;
            color: #ffffff;
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        h2 {
            color: #ff4444; /* Красный для ошибки */
            font-size: 3rem;
            text-transform: uppercase;
        }
        p {
            font-size: 1.2rem;
            margin-bottom: 20px;
        }
        a {
            color: #00ccff;
            text-decoration: none;
            border: 2px solid #00ccff;
            padding: 10px 20px;
            border-radius: 5px;
            transition: 0.3s;
        }
        a:hover {
            background-color: #00ccff;
            color: #000000;
            box-shadow: 0 0 15px #00ccff;
        }
    </style>
</head>
<body>
<h2>ERROR 404</h2>
<p th:text="${message} ?: 'Страница или книга не найдена'"></p>
<a th:href="@{/books}">ВЕРНУТЬСЯ В БИБЛИОТЕКУ</a>
</body>
</html>
