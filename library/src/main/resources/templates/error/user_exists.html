<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>SECURITY_BREACH: CLONE_DETECTED</title>
    <style>
        /* --- ЖЕСТКИЙ КРАСНЫЙ ГЛЮК --- */
        @keyframes glitch-heavy {
            0% { transform: translate(0); }
            20% { transform: translate(-5px, 5px); }
            40% { transform: translate(-5px, -5px); }
            60% { transform: translate(5px, 5px); }
            80% { transform: translate(5px, -5px); }
            100% { transform: translate(0); }
        }

        @keyframes pulse-red {
            0% { background: #050000; }
            50% { background: #1a0000; }
            100% { background: #050000; }
        }

        body {
            background: #050000;
            color: #ff4444;
            font-family: 'Inter', 'Segoe UI', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            text-align: center;
            animation: pulse-red 2s infinite;
        }

        /* Помехи на экране */
        body::after {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: url('https://media.giphy.com/media/oEI9uWUicvS7K/giphy.gif');
            opacity: 0.05;
            pointer-events: none;
            z-index: 5;
        }

        h2 {
            font-size: 6rem;
            margin: 0;
            text-transform: uppercase;
            letter-spacing: 15px;
            color: #ff4444;
            text-shadow: 0 0 20px #ff0000;
            animation: glitch-heavy 0.1s infinite;
        }

        p {
            font-size: 1.3rem;
            text-transform: uppercase;
            letter-spacing: 5px;
            color: #fff;
            margin-bottom: 40px;
            padding: 20px 40px;
            background: rgba(255, 0, 0, 0.2);
            border: 1px solid #ff4444;
            box-shadow: 0 0 30px rgba(255, 0, 0, 0.4);
        }

        a {
            color: #fff;
            text-decoration: none;
            border: 2px solid #ff4444;
            padding: 15px 40px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 4px;
            transition: all 0.2s;
            background: #ff4444;
            box-shadow: 0 0 20px rgba(255, 0, 0, 0.5);
        }

        a:hover {
            background-color: #fff;
            color: #ff4444;
            box-shadow: 0 0 60px #fff;
            transform: scale(1.1) rotate(-2deg);
        }

        .corner-info {
            position: absolute;
            bottom: 20px;
            left: 20px;
            font-family: monospace;
            font-size: 10px;
            color: #440000;
            text-align: left;
        }
    </style>
</head>
<body>

<h2>ID_CONFLICT</h2>
<p th:text="${message} ?: 'REDUNDANCY_ERROR: Данный идентификатор уже активен'"></p>

<a href="javascript:history.back()">[ TERMINATE_DUPLICATE_SESSION ]</a>

<div class="corner-info">
    ALERT: CLONE_IDENTIFIED<br>
    SECTOR: USER_RECORDS<br>
    ACTION: DENY_ACCESS
</div>

</body>
</html>
