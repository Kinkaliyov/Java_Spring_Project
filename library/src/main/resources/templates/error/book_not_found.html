<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>DATA_VOID: BOOK_NOT_FOUND</title>
    <style>
        /* --- ЦИАНОВЫЙ ГЛЮК --- */
        @keyframes glitch {
            0% { text-shadow: 2px 0 #00d4ff, -2px 0 #ffffff; }
            25% { text-shadow: -2px 0 #00d4ff, 2px 0 #ffffff; }
            50% { text-shadow: 2px -2px #00d4ff, -2px 2px #ffffff; }
            75% { text-shadow: -2px 2px #00d4ff, 2px -2px #ffffff; }
            100% { text-shadow: 2px 0 #00d4ff, -2px 0 #ffffff; }
        }

        /* Эффект шума (Grain) */
        .noise {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: url('https://media.giphy.com/media/oEI9uWUicvS7K/giphy.gif');
            opacity: 0.03;
            pointer-events: none;
            z-index: 20;
        }

        body {
            background: #020b0d; /* Глубокий темно-бирюзовый */
            color: #e0e0e0;
            font-family: 'Inter', 'Segoe UI', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            text-align: center;
        }

        /* Линии развертки */
        body::before {
            content: " ";
            position: absolute;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.2) 50%),
                        linear-gradient(90deg, rgba(0, 212, 255, 0.03), rgba(255, 255, 255, 0.01), rgba(0, 212, 255, 0.03));
            background-size: 100% 2px, 3px 100%;
            pointer-events: none;
            z-index: 10;
        }

        h2 {
            color: #00d4ff;
            font-size: 5.5rem;
            margin: 0;
            text-transform: uppercase;
            letter-spacing: 10px;
            animation: glitch 0.5s infinite;
            position: relative;
        }

        p {
            font-size: 1.1rem;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: #8be9fd;
            margin-bottom: 40px;
            padding: 15px;
            border: 1px dashed #00d4ff;
            background: rgba(0, 212, 255, 0.02);
        }

        a {
            color: #fff;
            text-decoration: none;
            border: 1px solid #00d4ff;
            padding: 15px 40px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 4px;
            transition: all 0.3s;
            background: rgba(0, 212, 255, 0.1);
            box-shadow: inset 0 0 10px rgba(0, 212, 255, 0.2);
        }

        a:hover {
            background-color: #00d4ff;
            color: #000;
            box-shadow: 0 0 50px rgba(0, 212, 255, 0.8);
            transform: scale(1.1);
        }

        .corner-info {
            position: absolute;
            top: 20px;
            right: 20px;
            font-family: monospace;
            font-size: 10px;
            color: #005a6b;
            text-align: right;
        }
    </style>
</head>
<body>

<div class="noise"></div>

<h2>FILE_NOT_FOUND</h2>
<p th:text="${message} ?: 'NULL_POINTER: Сектор данных пуст или перезаписан'"></p>

<a th:href="@{/books}">[ BACK_TO_DATABASE ]</a>

<div class="corner-info">
    ERROR_CODE: 0x404_BOOK_NULL<br>
    FS_STATUS: CORRUPTED<br>
    LOCATION: /root/library/storage
</div>

</body>
</html>
