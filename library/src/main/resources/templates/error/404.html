<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>SYSTEM FAILURE: 404</title>
    <style>
        /* --- ГЛЮК-АНИМАЦИЯ --- */
        @keyframes glitch {
            0% { text-shadow: 2px 0 #ff4444, -2px 0 #00d4ff; }
            25% { text-shadow: -2px 0 #ff4444, 2px 0 #00d4ff; }
            50% { text-shadow: 2px -2px #ff4444, -2px 2px #00d4ff; }
            75% { text-shadow: -2px 2px #ff4444, 2px -2px #00d4ff; }
            100% { text-shadow: 2px 0 #ff4444, -2px 0 #00d4ff; }
        }

        @keyframes scanline {
            0% { bottom: 100%; }
            100% { bottom: 0%; }
        }

        /* --- БАЗА --- */
        body {
            background: #050505;
            color: #e0e0e0;
            font-family: 'Inter', 'Segoe UI', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            text-align: center;
        }

        /* Эффект старого монитора */
        body::before {
            content: " ";
            position: absolute;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%),
                        linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            background-size: 100% 2px, 3px 100%;
            pointer-events: none;
            z-index: 10;
        }

        h2 {
            color: #ff4444;
            font-size: 6rem;
            margin: 0;
            text-transform: uppercase;
            letter-spacing: 15px;
            animation: glitch 0.2s infinite;
            position: relative;
        }

        p {
            font-size: 1.2rem;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: #888;
            margin-bottom: 40px;
            border-left: 3px solid #ff4444;
            padding-left: 15px;
        }

        /* КНОПКА ВОЗВРАТА */
        a {
            color: #00d4ff;
            text-decoration: none;
            border: 1px solid #00d4ff;
            padding: 15px 30px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 4px;
            transition: all 0.3s;
            position: relative;
            background: rgba(0, 212, 255, 0.05);
        }

        a:hover {
            background-color: #00d4ff;
            color: #000000;
            box-shadow: 0 0 30px rgba(0, 212, 255, 0.6);
            transform: translateY(-5px);
        }

        /* Код ошибки в углу */
        .corner-info {
            position: absolute;
            bottom: 20px;
            left: 20px;
            font-family: monospace;
            font-size: 10px;
            color: #333;
            text-align: left;
        }
    </style>
</head>
<body>

<h2>404</h2>
<p th:text="${message} ?: 'DATA_NOT_FOUND: Сектор не обнаружен'"></p>

<a th:href="@{/books}">[ ВЕРНУТЬСЯ_В_СИСТЕМУ ]</a>

<div class="corner-info">
    STATUS: CRITICAL_ERROR<br>
    SECTOR: UNKNOWN<br>
    TRACE: 0x800404AF
</div>

</body>
</html>
