<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>SYSTEM FAILURE: CORE_DUMP</title>
    <style>
        /* --- ЭФФЕКТ ГЛИТЧА И ТРЕВОГИ --- */
        @keyframes emergency {
            0% { background-color: #050505; }
            50% { background-color: #1a0f05; } /* Оранжевый оттенок */
            100% { background-color: #050505; }
        }

        @keyframes glitch {
            0% { transform: translate(0); }
            20% { transform: translate(-3px, 3px); }
            40% { transform: translate(-3px, -3px); }
            60% { transform: translate(3px, 3px); }
            80% { transform: translate(3px, -3px); }
            100% { transform: translate(0); }
        }

        body {
            background-color: #050505;
            color: #ffffff;
            font-family: 'Inter', 'Segoe UI', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            animation: emergency 3s infinite ease-in-out;
        }

        .warning-icon {
            font-size: 80px;
            color: #ff6600; /* Оранжевый */
            margin-bottom: 10px;
            animation: glitch 0.5s infinite;
        }

        h2 {
            color: #ff6600;
            font-size: 4rem;
            margin: 0;
            text-transform: uppercase;
            letter-spacing: 10px;
            font-weight: 900;
            text-shadow: 0 0 20px #ff6600;
        }

        .status-box {
            border: 2px solid #ff6600;
            padding: 20px 40px;
            margin: 30px 0;
            background: rgba(255, 102, 0, 0.05);
            backdrop-filter: blur(5px);
            clip-path: polygon(5% 0, 100% 0, 95% 100%, 0 100%); /* Скошенные края */
        }

        .error-msg {
            font-size: 1.1rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #ff9933;
            margin: 0;
            text-align: center;
        }

        /* КНОПКА ПЕРЕЗАГРУЗКИ */
        a {
            color: #ffffff;
            text-decoration: none;
            border: 1px solid #ff6600;
            padding: 12px 25px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 3px;
            transition: all 0.3s;
            background: rgba(255, 102, 0, 0.1);
        }

        a:hover {
            background-color: #ff6600;
            color: #000000;
            box-shadow: 0 0 30px #ff6600;
        }

        /* ЛОГ ОШИБКИ */
        .stack-log {
            margin-top: 30px;
            font-family: monospace;
            font-size: 12px;
            color: #664422;
            max-width: 600px;
            text-align: left;
            border-left: 2px solid #ff6600;
            padding-left: 15px;
        }
    </style>
</head>
<body>

<div class="warning-icon">⚙</div>
<h2>500</h2>

<div class="status-box">
    <div class="error-msg">КРИТИЧЕСКАЯ ОШИБКА ЯДРА: СИСТЕМА ПЕРЕГРУЖЕНА</div>
</div>

<div class="stack-log">
    [KERNEL_PANIC]: <span th:text="${message} ?: 'Unknown fatal error'"></span><br>
    [MODULE]: SERVER_SIDE_LOGIC<br>
    [STATUS]: CRITICAL_FAILURE
</div>

<br>
<a th:href="@{/}">[ REBOOT_SYSTEM ]</a>

<div style="position: absolute; bottom: 30px; font-size: 10px; color: #444; text-transform: uppercase; letter-spacing: 5px;">
    System shutdown initiated...
</div>

</body>
</html>
