<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>SYNC_FAILURE: PASS_MISMATCH</title>
    <style>
        /* --- ЖЕЛТЫЙ ГЛЮК ПРЕДУПРЕЖДЕНИЯ --- */
        @keyframes glitch {
            0% { text-shadow: 2px 0 #ffcc00, -2px 0 #ff4444; }
            25% { text-shadow: -2px 0 #ffcc00, 2px 0 #ff4444; }
            50% { text-shadow: 2px -2px #ffcc00, -2px 2px #ff4444; }
            75% { text-shadow: -2px 2px #ffcc00, 2px -2px #ff4444; }
            100% { text-shadow: 2px 0 #ffcc00, -2px 0 #ff4444; }
        }

        /* Мигающая рамка экрана */
        @keyframes warning-border {
            0%, 100% { box-shadow: inset 0 0 50px rgba(255, 204, 0, 0.1); }
            50% { box-shadow: inset 0 0 100px rgba(255, 204, 0, 0.3); }
        }

        body {
            background: #0d0a00; /* Очень темный золотистый */
            color: #e0e0e0;
            font-family: 'Inter', 'Segoe UI', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            text-align: center;
            animation: warning-border 2s infinite;
        }

        body::before {
            content: " ";
            position: absolute;
            top: 0; left: 0; bottom: 0; right: 0;
            background: repeating-linear-gradient(0deg, rgba(255, 204, 0, 0.03) 0px, rgba(255, 204, 0, 0.03) 1px, transparent 1px, transparent 2px);
            pointer-events: none;
            z-index: 10;
        }

        h2 {
            color: #ffcc00;
            font-size: 5rem;
            margin: 0;
            text-transform: uppercase;
            letter-spacing: 8px;
            animation: glitch 0.2s infinite;
            position: relative;
        }

        p {
            font-size: 1.2rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #ffcc00;
            margin-bottom: 40px;
            padding: 20px;
            background: rgba(255, 204, 0, 0.1);
            border: 2px solid #ffcc00;
            clip-path: polygon(0% 0%, 100% 0%, 95% 100%, 5% 100%);
        }

        a {
            color: #000;
            text-decoration: none;
            background: #ffcc00;
            padding: 15px 40px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 3px;
            transition: all 0.3s;
            clip-path: polygon(10% 0, 100% 0, 90% 100%, 0% 100%);
        }

        a:hover {
            background-color: #fff;
            box-shadow: 0 0 40px #ffcc00;
            transform: skewX(-10deg);
        }

        .corner-info {
            position: absolute;
            bottom: 20px;
            right: 20px;
            font-family: monospace;
            font-size: 10px;
            color: #665200;
            text-align: right;
        }
    </style>
</head>
<body>

<h2>SYNC_FAILURE</h2>
<p th:text="${message} ?: 'HASH_MISMATCH: Ключи доступа не идентичны'"></p>

<a href="javascript:history.back()">[ RE-ENTER_SECURITY_KEY ]</a>

<div class="corner-info">
    ENCRYPTION: AES-256<br>
    ERROR_TYPE: PARITY_CHECK_FAILED<br>
    MODULE: AUTH_CORE_v4
</div>

</body>
</html>
