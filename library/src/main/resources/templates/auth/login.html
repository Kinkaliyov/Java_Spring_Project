<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Вход в систему</title>
    <style>
        /* --- АНИМАЦИИ --- */
        @keyframes pageReveal {
            from { opacity: 0; transform: translateY(20px) scale(0.98); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        @keyframes neonPulse {
            0% { box-shadow: 0 0 5px rgba(0, 212, 255, 0.2); }
            50% { box-shadow: 0 0 20px rgba(0, 212, 255, 0.5); }
            100% { box-shadow: 0 0 5px rgba(0, 212, 255, 0.2); }
        }

        /* --- БАЗА --- */
        body {
            background: radial-gradient(circle at center, #1a1a1a 0%, #000000 100%);
            color: #e0e0e0;
            font-family: 'Inter', 'Segoe UI', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden; /* Скрываем скролл */
            animation: pageReveal 0.8s cubic-bezier(0.22, 1, 0.36, 1);
        }

        /* --- КАРТОЧКА ЛОГИНА (Glassmorphism) --- */
        .login-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(0, 212, 255, 0.2);
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.6);
            width: 100%;
            max-width: 380px;
            text-align: center;
        }

        h2 {
            color: #00d4ff;
            text-transform: uppercase;
            letter-spacing: 5px;
            text-shadow: 0 0 15px rgba(0, 212, 255, 0.5);
            margin-bottom: 30px;
            font-size: 24px;
        }

        /* --- ИНПУТЫ --- */
        .input-group {
            margin-bottom: 20px;
            text-align: left;
        }

        input {
            width: 100%;
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid #333;
            border-radius: 6px;
            color: #fff;
            padding: 14px;
            outline: none;
            font-size: 15px;
            transition: all 0.3s ease;
            box-sizing: border-box;
        }

        input:focus {
            border-color: #00d4ff;
            background: rgba(0, 212, 255, 0.05);
            box-shadow: 0 0 15px rgba(0, 212, 255, 0.3);
            transform: translateY(-2px);
        }

        /* --- КНОПКА --- */
        button {
            width: 100%;
            background: transparent;
            border: 2px solid #00d4ff;
            color: #00d4ff;
            padding: 14px;
            border-radius: 6px;
            font-weight: 800;
            text-transform: uppercase;
            cursor: pointer;
            letter-spacing: 2px;
            transition: 0.3s;
            margin-top: 10px;
        }

        button:hover {
            background: #00d4ff;
            color: #000;
            box-shadow: 0 0 30px rgba(0, 212, 255, 0.6);
        }

        /* --- СООБЩЕНИЯ ОБ ОШИБКАХ --- */
        .msg {
            font-size: 13px;
            margin-top: 20px;
            padding: 10px;
            border-radius: 4px;
        }

        .error {
            color: #ff4444;
            background: rgba(255, 68, 68, 0.1);
            border: 1px solid rgba(255, 68, 68, 0.2);
        }

        .success {
            color: #00ff88;
            background: rgba(0, 255, 136, 0.1);
            border: 1px solid rgba(0, 255, 136, 0.2);
        }
    </style>
</head>
<body>

<div class="login-card">
    <form th:action="@{/login}" method="post">
        <h2>Система</h2>

        <div class="input-group">
            <input type="text" name="username" placeholder="USERNAME" required/>
        </div>

        <div class="input-group">
            <input type="password" name="password" placeholder="PASSWORD" required/>
        </div>

        <button type="submit">Авторизация</button>

        <div th:if="${param.error}" class="msg error">
            ДОСТУП ЗАПРЕЩЕН: Ошибка данных
        </div>

        <div th:if="${param.logout}" class="msg success">
            СЕССИЯ ЗАВЕРШЕНА
        </div>
    </form>
</div>

</body>
</html>
