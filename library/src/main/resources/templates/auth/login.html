<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="#{login.header}">Terminal Login</title>
    <style>
        /* --- БАЗА И ЖИВОЙ ФОН --- */
        body {
            background: #050505;
            color: #e0e0e0;
            font-family: 'Inter', sans-serif;
            margin: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        /* Те же сферы для атмосферы */
        body::before, body::after {
            content: "";
            position: fixed;
            width: 500px;
            height: 500px;
            border-radius: 50%;
            background: rgba(0, 212, 255, 0.08);
            filter: blur(100px);
            z-index: -1;
            animation: float 20s infinite alternate ease-in-out;
        }
        body::after {
            background: rgba(255, 0, 212, 0.04);
            left: -10%;
            top: -10%;
            animation-duration: 25s;
        }

        @keyframes float {
            0% { transform: translate(-10%, -10%) scale(1); }
            100% { transform: translate(20%, 20%) scale(1.1); }
        }

        /* --- GLASS PANEL LOGIN --- */
        .login-container {
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(25px) saturate(180%);
            -webkit-backdrop-filter: blur(25px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 45px;
            width: 100%;
            max-width: 380px;
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.8);
            text-align: center;
            animation: panelSlide 0.8s ease-out;
        }

        @keyframes panelSlide {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h2 {
            color: #00d4ff;
            text-transform: uppercase;
            letter-spacing: 5px;
            text-shadow: 0 0 15px rgba(0, 212, 255, 0.5);
            margin-bottom: 35px;
            font-family: monospace;
        }

        /* --- INPUT GROUPS --- */
        .input-group {
            margin-bottom: 20px;
        }

        input {
            width: 100%;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            padding: 14px;
            color: #fff;
            font-size: 14px;
            outline: none;
            transition: 0.3s;
            box-sizing: border-box;
            text-align: center;
        }

        input:focus {
            border-color: #00d4ff;
            background: rgba(0, 212, 255, 0.05);
            box-shadow: 0 0 15px rgba(0, 212, 255, 0.2);
        }

        /* --- КНОПКА --- */
        button {
            width: 100%;
            background: #00d4ff;
            border: none;
            color: #000;
            padding: 15px;
            border-radius: 8px;
            font-weight: 900;
            text-transform: uppercase;
            cursor: pointer;
            letter-spacing: 2px;
            transition: 0.4s;
            margin-top: 10px;
        }

        button:hover {
            background: #05f2ff;
            box-shadow: 0 0 30px rgba(0, 212, 255, 0.5);
            transform: translateY(-2px);
        }

        /* --- ССЫЛКИ И СООБЩЕНИЯ --- */
        .register-link {
            margin-top: 25px;
        }

        .register-link a {
            color: #444;
            text-decoration: none;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: 0.3s;
        }

        .register-link a:hover {
            color: #00d4ff;
        }

        .status-msg {
            margin-top: 20px;
            font-size: 11px;
            text-transform: uppercase;
            font-weight: bold;
            letter-spacing: 1px;
            padding: 10px;
            border-radius: 6px;
        }

        .error {
            color: #ff4444;
            background: rgba(255, 68, 68, 0.1);
            border: 1px solid rgba(255, 68, 68, 0.2);
        }

        .logout {
            color: #00ff88;
            background: rgba(0, 255, 136, 0.1);
            border: 1px solid rgba(0, 255, 136, 0.2);
        }
        .status-msg {
    margin-top: 20px;
    padding: 12px;
    border-radius: 8px;
    font-size: 11px;
    text-transform: uppercase;
    font-weight: 800;
    letter-spacing: 1px;
    animation: blink 2s infinite ease-in-out;
}

.error {
    background: rgba(255, 68, 68, 0.1);
    border: 1px solid #ff4444;
    color: #ff4444;
    box-shadow: 0 0 15px rgba(255, 68, 68, 0.2);
}

.logout {
    background: rgba(0, 255, 136, 0.1);
    border: 1px solid #00ff88;
    color: #00ff88;
    box-shadow: 0 0 15px rgba(0, 255, 136, 0.2);
}

@keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.7; }
}
    </style>
</head>
<body>

<div class="login-container">
    <form th:action="@{/login}" method="post">
        <h2 th:text="#{login.header}">Terminal</h2>

        <div class="input-group">
            <input type="text" name="username" th:placeholder="#{login.placeholder.user}" required/>
        </div>

        <div class="input-group">
            <input type="password" name="password" th:placeholder="#{login.placeholder.pass}" required/>
        </div>

        <button type="submit" th:text="#{login.btn.execute}">Execute Login</button>

        <div class="register-link">
            <a th:href="@{/register}" th:text="#{login.link.register}">New User? Create Account</a>
        </div>

        <div th:if="${param.error}" class="status-msg error">
            <span th:text="#{login.msg.error}">Access Denied: Invalid Credentials</span>
        </div>

        <div th:if="${param.logout}" class="status-msg logout">
            <span th:text="#{login.msg.logout}">Connection Terminated Successfully</span>
        </div>
    </form>
</div>

</body>
</html>
