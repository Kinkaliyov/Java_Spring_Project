<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Edit Protocol</title>
    <style>
        /* --- БАЗА И ЖИВОЙ ФОН --- */
        body {
            background: #050505;
            color: #e0e0e0;
            font-family: 'Inter', sans-serif;
            margin: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        body::before, body::after {
            content: "";
            position: fixed;
            width: 500px;
            height: 500px;
            border-radius: 50%;
            background: rgba(0, 212, 255, 0.08);
            filter: blur(100px);
            z-index: -1;
            animation: float 20s infinite alternate ease-in-out;
        }
        body::after {
            background: rgba(255, 0, 212, 0.04);
            right: -10%;
            bottom: -10%;
            animation-duration: 25s;
        }

        @keyframes float {
            0% { transform: translate(-10%, -10%) scale(1); }
            100% { transform: translate(20%, 20%) scale(1.1); }
        }

        /* --- TYPEWRITER --- */
        .typewriter h1 {
            color: #00d4ff;
            font-family: monospace;
            overflow: hidden;
            border-right: .15em solid #00d4ff;
            white-space: nowrap;
            margin: 0 auto 30px auto;
            letter-spacing: .15em;
            animation: typing 2s steps(20, end), blink-caret .5s step-end infinite;
            width: fit-content;
            font-size: 24px;
            text-transform: uppercase;
        }

        @keyframes typing { from { width: 0 } to { width: 100% } }
        @keyframes blink-caret { from, to { border-color: transparent } 50% { border-color: #00d4ff } }

        /* --- DYNAMIC GLASS PANEL --- */
        .glass-panel {
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(25px) saturate(180%);
            -webkit-backdrop-filter: blur(25px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 40px;
            width: 100%;
            max-width: 500px;
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.8);
            text-align: center;
        }

        /* --- INPUT GROUPS --- */
        .input-group {
            margin-bottom: 20px;
            text-align: left;
        }

        label {
            display: block;
            font-size: 10px;
            color: #00d4ff;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 8px;
            font-weight: 800;
            opacity: 0.7;
        }

        input {
            width: 100%;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            padding: 12px 16px;
            color: #fff;
            font-size: 14px;
            outline: none;
            transition: 0.3s;
            box-sizing: border-box;
        }

        input:focus {
            border-color: #00d4ff;
            background: rgba(0, 212, 255, 0.05);
            box-shadow: 0 0 15px rgba(0, 212, 255, 0.2);
        }

        .error-field { border-color: #ff4444 !important; }
        .error-message { color: #ff4444; font-size: 10px; margin-top: 5px; text-transform: uppercase; }

        /* --- BUTTONS --- */
        .btn-update {
            width: 100%;
            background: #00d4ff;
            border: none;
            padding: 15px;
            border-radius: 8px;
            color: #000;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            transition: 0.4s;
            margin-top: 15px;
        }

        .btn-update:hover {
            box-shadow: 0 0 30px rgba(0, 212, 255, 0.5);
            transform: translateY(-2px);
            background: #05f2ff;
        }

        .back-link {
            display: block;
            margin-top: 25px;
            color: #444;
            text-decoration: none;
            font-size: 11px;
            letter-spacing: 1px;
            text-transform: uppercase;
            transition: 0.3s;
        }

        .back-link:hover { color: #00d4ff; }

        /* --- СТИЛИ ДЛЯ SELECT (EDIT PROTOCOL) --- */
select {
    width: 100%;
    background: rgba(255, 255, 255, 0.04);
    border: 1px solid rgba(255, 255, 255, 0.1);
    border-radius: 8px;
    padding: 12px 16px;
    color: #fff;
    font-size: 14px;
    outline: none;
    transition: 0.3s;
    cursor: pointer;
    /* Убираем дефолтную стрелку */
    appearance: none;
    -webkit-appearance: none;
    -moz-appearance: none;
    /* Наша неоновая стрелка через SVG */
    background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%2300d4ff' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
    background-repeat: no-repeat;
    background-position: right 15px center;
    background-size: 15px;
    box-sizing: border-box;
}

select:focus {
    border-color: #00d4ff;
    background-color: rgba(0, 212, 255, 0.05);
    box-shadow: 0 0 15px rgba(0, 212, 255, 0.2);
}

/* Чтобы внутри списка фон не был белым (насколько браузер позволит) */
select option {
    background-color: #0a0a0a;
    color: #fff;
}
    </style>
</head>
<body>

<div class="glass-panel">
    <div class="typewriter">
        <h1 th:text="'> EDIT_RECORD_ID_' + ${book.id}"></h1>
    </div>

    <form th:action="@{/books}" th:object="${book}" method="post">
        <input type="hidden" th:field="*{id}"/>

        <div class="input-group">
            <label>Protocol Title</label>
            <input type="text" th:field="*{title}" placeholder="System name..."
                   th:classappend="${#fields.hasErrors('title')} ? 'error-field'"/>
            <span class="error-message" th:if="${#fields.hasErrors('title')}" th:errors="*{title}"></span>
        </div>

        <div class="input-group">
            <label>Source Author</label>
            <select th:field="*{authorId}"
                    th:classappend="${#fields.hasErrors('authorId')} ? 'error-field'">
                <option value="" disabled selected>-- SELECT IDENTIFIER --</option>
                <option th:each="author : ${authors}"
                        th:value="${author.id}"
                        th:text="${author.name}">
                </option>
            </select>
            <span class="error-message" th:if="${#fields.hasErrors('authorId')}" th:errors="*{authorId}"></span>
        </div>

        <div style="display: flex; gap: 15px;">
            <div class="input-group" style="flex: 1;">
                <label>Value (Credits)</label>
                <input type="number" step="0.01" th:field="*{price}"
                       th:classappend="${#fields.hasErrors('price')} ? 'error-field'"/>
            </div>

            <div class="input-group" style="flex: 1;">
                <label>Stock Quantity</label>
                <input type="number" th:field="*{amount}"
                       th:classappend="${#fields.hasErrors('amount')} ? 'error-field'"/>
            </div>
        </div>

        <div style="text-align: left; margin-top: -10px; margin-bottom: 10px;">
            <span class="error-message" th:if="${#fields.hasErrors('price')}" th:errors="*{price}"></span>
            <span class="error-message" th:if="${#fields.hasErrors('amount')}" th:errors="*{amount}"></span>
        </div>

        <button type="submit" class="btn-update">Commit Changes_</button>
        <a th:href="@{/books}" class="back-link">[ CANCEL_AND_EXIT ]</a>
    </form>
</div>

</body>
</html>
