<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Редактировать книгу</title>
    <style>
        /* --- КИБЕРПАНК АНИМАЦИИ --- */
        @keyframes pageReveal {
            from { opacity: 0; transform: translateY(20px) scale(0.98); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        /* --- БАЗА --- */
        body {
            background: radial-gradient(circle at center, #1a1a1a 0%, #000000 100%);
            color: #e0e0e0;
            font-family: 'Inter', 'Segoe UI', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            margin: 0;
            height: 100vh;
            width: 100vw;
            overflow: hidden; /* Запрет скролла */
            animation: pageReveal 0.8s cubic-bezier(0.22, 1, 0.36, 1);
        }

        h1 {
            color: #00d4ff;
            text-transform: uppercase;
            letter-spacing: 4px;
            text-shadow: 0 0 15px rgba(0, 212, 255, 0.5);
            margin-bottom: 25px;
        }

        /* --- ФОРМА (Glassmorphism) --- */
        .glass-form {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
            width: 100%;
            max-width: 450px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        label {
            color: #00d4ff;
            font-size: 11px;
            text-transform: uppercase;
            font-weight: bold;
            letter-spacing: 1px;
        }

        input {
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid #333;
            border-radius: 6px;
            color: #fff;
            padding: 10px 14px;
            outline: none;
            transition: all 0.3s ease;
        }

        input:focus {
            border-color: #00d4ff;
            background: rgba(0, 212, 255, 0.05);
            box-shadow: 0 0 12px rgba(0, 212, 255, 0.3);
        }

        /* Ошибки */
        .error-field { border-color: #ff4444 !important; }
        .error { color: #ff4444; font-size: 11px; font-weight: bold; }

        /* Кнопки */
        button {
            background: transparent;
            border: 2px solid #00d4ff;
            color: #00d4ff;
            padding: 12px;
            border-radius: 6px;
            font-weight: 800;
            text-transform: uppercase;
            cursor: pointer;
            letter-spacing: 2px;
            margin-top: 10px;
            transition: 0.3s;
        }

        button:hover {
            background: #00d4ff;
            color: #000;
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.6);
        }

        a {
            text-align: center;
            color: #666;
            text-decoration: none;
            font-size: 12px;
            transition: 0.3s;
            text-transform: uppercase;
        }

        a:hover { color: #00d4ff; }
    </style>
</head>
<body>

<h1>Редактирование</h1>

<form th:action="@{/books}" th:object="${book}" method="post" class="glass-form">

    <input type="hidden" th:field="*{id}"/>

    <div class="input-group">
        <label>Тайтл</label>
        <input type="text" th:field="*{title}"
               th:classappend="${#fields.hasErrors('title')} ? 'error-field'"/>
        <span class="error" th:if="${#fields.hasErrors('title')}" th:errors="*{title}"></span>
    </div>

    <div class="input-group">
        <label>Автор</label>
        <input type="text" th:field="*{author}"
               th:classappend="${#fields.hasErrors('author')} ? 'error-field'"/>
        <span class="error" th:if="${#fields.hasErrors('author')}" th:errors="*{author}"></span>
    </div>

    <div style="display: flex; gap: 15px;">
        <div class="input-group" style="flex: 1;">
            <label>Цена</label>
            <input type="number" step="0.01" th:field="*{price}"
                   th:classappend="${#fields.hasErrors('price')} ? 'error-field'"/>
            <span class="error" th:if="${#fields.hasErrors('price')}" th:errors="*{price}"></span>
        </div>

        <div class="input-group" style="flex: 1;">
            <label>Кол-во</label>
            <input type="number" th:field="*{amount}"
                   th:classappend="${#fields.hasErrors('amount')} ? 'error-field'"/>
            <span class="error" th:if="${#fields.hasErrors('amount')}" th:errors="*{amount}"></span>
        </div>
    </div>

    <button type="submit">Сохранить изменения</button>
    <a th:href="@{/books}">Назад в систему</a>
</form>

</body>
</html>
