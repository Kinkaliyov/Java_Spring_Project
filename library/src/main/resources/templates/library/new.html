<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>New Entry Protocol</title>
    <style>
        /* --- БАЗА И ЖИВОЙ ФОН --- */
        body {
            background: #050505;
            color: #e0e0e0;
            font-family: 'Inter', sans-serif;
            margin: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        /* Те же неоновые сферы, что и в остальных файлах */
        body::before, body::after {
            content: "";
            position: fixed;
            width: 500px;
            height: 500px;
            border-radius: 50%;
            background: rgba(0, 212, 255, 0.08);
            filter: blur(100px);
            z-index: -1;
            animation: float 20s infinite alternate ease-in-out;
        }
        body::after {
            background: rgba(255, 0, 212, 0.04);
            right: -10%;
            top: -10%;
            animation-duration: 25s;
            animation-delay: -5s;
        }

        @keyframes float {
            0% { transform: translate(-10%, -10%) scale(1); }
            100% { transform: translate(20%, 20%) scale(1.1); }
        }

        /* --- ЭФФЕКТ ПЕЧАТНОЙ МАШИНКИ --- */
        .typewriter h2 {
            color: #00d4ff;
            font-family: monospace;
            overflow: hidden;
            border-right: .15em solid #00d4ff;
            white-space: nowrap;
            margin: 0 auto 30px auto;
            letter-spacing: .15em;
            animation: typing 2.5s steps(25, end), blink-caret .5s step-end infinite;
            width: fit-content;
            text-transform: uppercase;
            font-size: 22px;
        }

        @keyframes typing { from { width: 0 } to { width: 100% } }
        @keyframes blink-caret { from, to { border-color: transparent } 50% { border-color: #00d4ff } }

        /* --- DYNAMIC GLASS PANEL --- */
        .glass-panel {
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(25px) saturate(180%);
            -webkit-backdrop-filter: blur(25px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 40px;
            width: 100%;
            max-width: 500px;
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.8);
            text-align: center;
            animation: panelSlide 0.8s ease-out;
        }

        @keyframes panelSlide {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* --- INPUT GROUPS --- */
        .input-group {
            margin-bottom: 20px;
            text-align: left;
        }

        label {
            display: block;
            font-size: 10px;
            color: #00d4ff;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 8px;
            font-weight: 800;
            opacity: 0.7;
        }

        input {
            width: 100%;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            padding: 12px 16px;
            color: #fff;
            font-size: 14px;
            outline: none;
            transition: 0.3s;
            box-sizing: border-box;
        }

        input:focus {
            border-color: #00d4ff;
            background: rgba(0, 212, 255, 0.05);
            box-shadow: 0 0 15px rgba(0, 212, 255, 0.2);
        }

        .error-field { border-color: #ff4444 !important; }
        .error-message { color: #ff4444; font-size: 10px; margin-top: 5px; text-transform: uppercase; }

        /* --- BUTTONS --- */
        .btn-submit {
            width: 100%;
            background: #00d4ff;
            border: none;
            padding: 15px;
            border-radius: 8px;
            color: #000;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            transition: 0.4s;
            margin-top: 15px;
        }

        .btn-submit:hover {
            box-shadow: 0 0 30px rgba(0, 212, 255, 0.5);
            transform: translateY(-2px);
            background: #05f2ff;
        }

        .back-link {
            display: block;
            margin-top: 25px;
            color: #444;
            text-decoration: none;
            font-size: 11px;
            letter-spacing: 1px;
            text-transform: uppercase;
            transition: 0.3s;
        }

        .back-link:hover { color: #00d4ff; }
    </style>
</head>
<body>

<div class="glass-panel">
    <div class="typewriter">
        <h2>> INITIALIZE_NEW_RECORD</h2>
    </div>

    <form th:action="@{/books}" th:object="${book}" method="post">

        <div class="input-group">
            <label>Protocol Title</label>
            <input type="text" th:field="*{title}" placeholder="System name..."
                   th:classappend="${#fields.hasErrors('title')} ? 'error-field'"/>
            <span class="error-message" th:if="${#fields.hasErrors('title')}" th:errors="*{title}"></span>
        </div>

        <div class="input-group">
            <label>Source Author</label>
            <input type="text" th:field="*{author}" placeholder="Unit identifier..."
                   th:classappend="${#fields.hasErrors('author')} ? 'error-field'"/>
            <span class="error-message" th:if="${#fields.hasErrors('author')}" th:errors="*{author}"></span>
        </div>

        <div style="display: flex; gap: 15px;">
            <div class="input-group" style="flex: 1;">
                <label>Value (Credits)</label>
                <input type="number" step="0.01" th:field="*{price}"
                       th:classappend="${#fields.hasErrors('price')} ? 'error-field'"/>
            </div>

            <div class="input-group" style="flex: 1;">
                <label>Stock Quantity</label>
                <input type="number" th:field="*{amount}"
                       th:classappend="${#fields.hasErrors('amount')} ? 'error-field'"/>
            </div>
        </div>

        <div style="text-align: left; margin-top: -10px; margin-bottom: 10px;">
            <span class="error-message" th:if="${#fields.hasErrors('price')}" th:errors="*{price}"></span>
            <span class="error-message" th:if="${#fields.hasErrors('amount')}" th:errors="*{amount}"></span>
        </div>

        <button type="submit" class="btn-submit">REGISTER_DATA_</button>
        <a th:href="@{/books}" class="back-link">[ ABORT_AND_EXIT ]</a>
    </form>
</div>

</body>
</html>
